<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Containers</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>

  <!-- Fixed container  -->
  <div class="container bg-primary text-white ">
    This is .container (changes width at breakpoints)
  </div>

  <!-- Full width always -->
  <div class="container-fluid bg-secondary text-white ">
    This is .container-fluid (always 100% width)
  </div>

  <!-- Breakpoint-based container total sizes sm,md,lg,xl,xxl-->
   

  <div class="container-sm bg-success text-white ">
    .container-sm (full width until ≥576px)
  </div>

  <div class="container-md bg-danger text-white ">
    .container-md (full width until ≥768px)
  </div>

  <div class="container-lg bg-warning ">
    .container-lg (full width until ≥992px)
  </div>

  <div class="container-xl bg-info text-white ">
    .container-xl (full width until ≥1200px)
  </div>

  <div class="container-xxl bg-secondary text-white ">
    .container-xxl (full width until ≥1400px)
  </div>


</body>
</html>
